<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Quartet</title>
  </head>
  <body>
    <div id="game-container">
      <div id="ui-panel">
        <h1 id="title">BLOCK QUARTET</h1>
        <div id="score">SCORE: 0</div>
        <div id="level">LINES: 0</div>
        <div id="combo" class="highlight"></div>
        <div id="multiplier" class="highlight"></div>
        
        <div class="instructions">
          <h3>CONTROLS</h3>
          <p>Left/Right Arrow: Move</p>
          <p>Down Arrow: Soft Drop</p>
          <p>Space: Hard Drop</p>
          <p>Up Arrow / X: Rotate CW</p>
          <p>Z: Rotate CCW</p>
        </div>
      </div>
      
      <canvas id="gameCanvas"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
